[platformio]
default_envs = crowpanel43

[env:crowpanel43]
; Jason2866's IDF5.3 platform is required to get CONFIG_SPIRAM_FETCH_INSTRUCTIONS
; compiled into the framework.  That flag lets ISR handlers live in PSRAM instead
; of IRAM, freeing the one IRAM_SAFE slot that LCD_CAM needs.  Without this the
; standard espressif32 (pioarduino) platform hits "No free interrupt inputs for
; LCD_CAM" and the RGB panel stays blank even though display.init() returns OK.
platform = https://github.com/Jason2866/platform-espressif32.git#_Arduino/IDF53
board = ESP32-S3-WROOM-1-N16R8
framework = arduino
monitor_speed = 115200
upload_speed = 921600
; Board JSON (boards/ESP32-S3-WROOM-1-N16R8.json) already sets qio_opi memory
; type, 16MB flash, and BOARD_HAS_PSRAM -- no need to repeat them here.
; sdkconfig.defaults.esp32s3 supplies the PSRAM/interrupt fix at IDF config level.
board_build.partitions = partitions.csv
build_flags =
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM_SPEED_120M=1
    -DLV_CONF_INCLUDE_SIMPLE
    ; LVGL font data -- these must be in build_flags (not only lv_conf.h) so that
    ; LVGL's font*.c library compilation units see them via the global -D path.
    -DLV_FONT_MONTSERRAT_12=1
    -DLV_FONT_MONTSERRAT_16=1
    -DLV_FONT_MONTSERRAT_20=1
    -DLV_FONT_MONTSERRAT_28=1
    -DLV_FONT_MONTSERRAT_48=1
lib_deps =
    lovyan03/LovyanGFX@^1.2.0
    lvgl/lvgl@8.3.11
