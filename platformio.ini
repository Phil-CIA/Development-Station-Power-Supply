[platformio]
default_envs = display_board

; ── Front display board (ESP32-C6, COM9) — bring-up env ──────────────────────
[env:display_board]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c6-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 460800
upload_port = COM9
monitor_port = COM9
monitor_dtr = 0
monitor_rts = 0
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DPANEL_CONTROLLER=PANEL_CTRL_ILI9488
    -DUSE_LEGACY_WRITE_ONLY_WAKE=1
    -DENABLE_AUTO_LEGACY_FALLBACK=0
    -DMINIMAL_TFT_ONLY=1
    -DDIAG_INVERT_DC=0
    -DDIAG_INVERT_CS=0
    -DDIAG_SWAP_BYTES=1
build_src_filter =
    +<display_main.cpp>
lib_deps =
    moononournation/GFX Library for Arduino @ ^1.6.5

[env:display_board_dc_invert]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c6-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 460800
upload_port = COM9
monitor_port = COM9
monitor_dtr = 0
monitor_rts = 0
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DPANEL_CONTROLLER=PANEL_CTRL_ILI9488
    -DUSE_LEGACY_WRITE_ONLY_WAKE=1
    -DENABLE_AUTO_LEGACY_FALLBACK=0
    -DMINIMAL_TFT_ONLY=1
    -DDIAG_INVERT_DC=1
build_src_filter =
    +<display_main.cpp>
lib_deps =
    moononournation/GFX Library for Arduino @ ^1.6.5

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = COM5
monitor_port = COM5
monitor_dtr = 0
monitor_rts = 0

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DUSER_SETUP_LOADED=1
    -DST7796_DRIVER=1
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=480
    -DTFT_MISO=19
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=4
    -DTFT_DC=16
    -DTFT_RST=-1
    -DTFT_HW_RST=17
    -DTFT_RST_ACTIVE_LOW=1
    -DSPI_FREQUENCY=10000000
    -DSPI_READ_FREQUENCY=5000000
    -DTOUCH_CS=14
    -DSPI_TOUCH_FREQUENCY=1000000
    -DI2C_SDA_GPIO=22
    -DI2C_SCL_GPIO=21
    -DMCP4231_SDI_PIN=19

build_src_filter =
    +<main.cpp>

lib_deps =
    bodmer/TFT_eSPI

upload_flags =
    --before
    no_reset
    --after
    no_reset

upload_speed = 115200

[env:esp32dev_lvgl_demo]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = COM4
monitor_port = COM4
monitor_dtr = 0
monitor_rts = 0

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DUSER_SETUP_LOADED=1
    -DST7796_DRIVER=1
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=480
    -DTFT_MISO=19
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=4
    -DTFT_DC=16
    -DTFT_RST=-1
    -DTFT_HW_RST=17
    -DTFT_RST_ACTIVE_LOW=1
    -DSPI_FREQUENCY=10000000
    -DSPI_READ_FREQUENCY=5000000
    -DLV_CONF_INCLUDE_SIMPLE

build_src_filter =
    +<lvgl_demo.cpp>

lib_deps =
    bodmer/TFT_eSPI
    lvgl/lvgl @ ^8.3.11

upload_flags =
    --before
    no_reset
    --after
    no_reset

upload_speed = 115200

